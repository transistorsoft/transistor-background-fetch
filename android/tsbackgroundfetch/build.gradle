signing {
    // Prefer in-memory key via Gradle props or env vars
    def inMemKey  = findProperty('signingInMemoryKey') ?: System.getenv('SIGNING_IN_MEMORY_KEY')
    def inMemPass = findProperty('signingInMemoryKeyPassword') ?: System.getenv('SIGNING_IN_MEMORY_KEY_PASSWORD')

    // Fallback: file-based key (matches TSLocationManager)
    def keyPath = findProperty('signingKey')
    def filePass = findProperty('signingPassword')

    if (inMemKey && inMemPass) {
        useInMemoryPgpKeys(inMemKey, inMemPass)
        sign publishing.publications
    } else if (keyPath) {
        def keyFile = file(keyPath)
        if (keyFile.exists()) {
            useInMemoryPgpKeys(keyFile.text, filePass as String)
            sign publishing.publications
        } else {
            logger.warn("[tsbackgroundfetch] ⚠️  Signing key file not found at ${keyPath}")
        }
    } else {
        logger.warn("[tsbackgroundfetch] ⚠️  No signing key configured; Sonatype publish will fail without signatures")
    }
}

////
// Version file helpers for :tsbackgroundfetch
// Uses: versioning/tsbackgroundfetch.properties (VERSION_NAME / VERSION_CODE)
//
tasks.register("initVersionProps") {
    doLast {
        def dir = rootProject.file("versioning")
        if (!dir.exists()) { dir.mkdirs() }
        def f = rootProject.file("versioning/${ARTIFACT_ID}.properties")
        if (!f.exists()) {
            def p = new Properties()
            p['VERSION_NAME'] = (ext.has('TS_BACKGROUND_FETCH_VERSION_NAME') ? ext.TS_BACKGROUND_FETCH_VERSION_NAME : "0.0.1").toString()
            p['VERSION_CODE'] = (ext.has('TS_BACKGROUND_FETCH_VERSION_CODE') ? ext.TS_BACKGROUND_FETCH_VERSION_CODE : "1").toString()
            f.withOutputStream { os -> p.store(os, null) }
            println "[tsbackgroundfetch] Created versioning/${ARTIFACT_ID}.properties with VERSION_NAME=${p['VERSION_NAME']} VERSION_CODE=${p['VERSION_CODE']}"
        } else {
            println "[tsbackgroundfetch] versioning/${ARTIFACT_ID}.properties already exists"
        }
    }
}

def writeTsBfVersionProps = { String name, String code ->
    def f = rootProject.file("versioning/${ARTIFACT_ID}.properties")
    def p = new Properties()
    if (f.exists()) { p.load(new FileInputStream(f)) }
    p['VERSION_NAME'] = name
    p['VERSION_CODE'] = code
    f.withOutputStream { os -> p.store(os, null) }
    ext.TS_BACKGROUND_FETCH_VERSION_NAME = name
    ext.TS_BACKGROUND_FETCH_VERSION_CODE = code
    println "[tsbackgroundfetch] Bumped to VERSION_NAME=${name} VERSION_CODE=${code}"
}

tasks.register("bumpVersionPatch") {
    dependsOn("initVersionProps")
    doLast {
        def f = rootProject.file("versioning/${ARTIFACT_ID}.properties")
        def p = new Properties(); p.load(new FileInputStream(f))
        def parts = p['VERSION_NAME'].toString().split('\\.').collect { it as int }
        while (parts.size() < 3) parts << 0
        parts[2] = parts[2] + 1
        def newName = "${parts[0]}.${parts[1]}.${parts[2]}"
        def newCode = (p['VERSION_CODE'].toString().toInteger() + 1).toString()
        writeTsBfVersionProps(newName, newCode)
    }
}

tasks.register("bumpVersionMinor") {
    dependsOn("initVersionProps")
    doLast {
        def f = rootProject.file("versioning/${ARTIFACT_ID}.properties")
        def p = new Properties(); p.load(new FileInputStream(f))
        def parts = p['VERSION_NAME'].toString().split('\\.').collect { it as int }
        while (parts.size() < 3) parts << 0
        parts[1] = parts[1] + 1
        parts[2] = 0
        def newName = "${parts[0]}.${parts[1]}.${parts[2]}"
        def newCode = (p['VERSION_CODE'].toString().toInteger() + 1).toString()
        writeTsBfVersionProps(newName, newCode)
    }
}

tasks.register("bumpVersionMajor") {
    dependsOn("initVersionProps")
    doLast {
        def f = rootProject.file("versioning/${ARTIFACT_ID}.properties")
        def p = new Properties(); p.load(new FileInputStream(f))
        def parts = p['VERSION_NAME'].toString().split('\\.').collect { it as int }
        while (parts.size() < 3) parts << 0
        parts[0] = parts[0] + 1
        parts[1] = 0
        parts[2] = 0
        def newName = "${parts[0]}.${parts[1]}.${parts[2]}"
        def newCode = (p['VERSION_CODE'].toString().toInteger() + 1).toString()
        writeTsBfVersionProps(newName, newCode)
    }
}
